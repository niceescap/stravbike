<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach Strava — Nicolas Scapino</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ── TOKENS ─────────────────────────────────────────── */
        :root {
            --bg:        #0D0F14;
            --surface:   #161A24;
            --surface2:  #1E2330;
            --border:    #2A3045;
            --text:      #E8EAF0;
            --muted:     #7A8099;
            --orange:    #FF6B35;
            --orange-dim:#FF6B3522;
            --mint:      #00D4AA;
            --mint-dim:  #00D4AA18;
            --red:       #FF4560;
            --amber:     #FFB020;
            --green:     #00C48C;
            --panel-w:   420px;
            --header-h:  52px;
        }

        /* ── RESET ───────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── SCROLLBAR ───────────────────────────────────────── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── HEADER ──────────────────────────────────────────── */
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        #header-left { display: flex; align-items: center; gap: 12px; }
        #logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
            color: var(--orange);
        }
        #logo span { color: var(--text); font-weight: 400; }
        #athlete-badge {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px 4px 4px;
            font-size: 12px; color: var(--muted);
        }
        #athlete-badge .avatar {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--orange-dim); border: 1px solid var(--orange);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: var(--orange); font-weight: 600;
        }
        #athlete-name-text { color: var(--text); font-weight: 500; }
        #header-right { display: flex; align-items: center; gap: 10px; }

        /* Bouton refresh */
        .btn-icon {
            background: none; border: 1px solid var(--border);
            color: var(--muted); border-radius: 8px;
            padding: 6px 10px; cursor: pointer; font-size: 14px;
            transition: all .15s;
        }
        .btn-icon:hover { border-color: var(--orange); color: var(--orange); }

        /* Bouton principal */
        .btn-primary {
            background: var(--orange); color: white;
            border: none; border-radius: 8px;
            padding: 7px 16px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
            transition: opacity .15s;
        }
        .btn-primary:hover { opacity: .85; }

        /* Bouton secondaire */
        .btn-secondary {
            background: var(--surface2); color: var(--text);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 14px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 13px;
            transition: all .15s;
        }
        .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }

        /* ── LAYOUT PRINCIPAL ────────────────────────────────── */
        #app {
            display: none; /* révélé après login */
            padding-top: var(--header-h);
            height: 100vh;
        }

        /* ── FULLCALENDAR OVERRIDE ───────────────────────────── */
        #calendar-wrap {
            height: calc(100vh - var(--header-h));
            padding: 16px;
            overflow: hidden;
        }

        /* FullCalendar dark skin */
        .fc { height: 100% !important; }
        .fc-theme-standard td, .fc-theme-standard th,
        .fc-theme-standard .fc-scrollgrid { border-color: var(--border) !important; }
        .fc-scrollgrid { background: var(--surface) !important; border-radius: 12px; overflow: hidden; }
        .fc-col-header-cell { background: var(--surface2) !important; }
        .fc-col-header-cell-cushion {
            color: var(--muted) !important; text-decoration: none !important;
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 8px !important;
        }
        .fc-daygrid-day { background: var(--surface) !important; cursor: pointer; transition: background .12s; }
        .fc-daygrid-day:hover { background: var(--surface2) !important; }
        .fc-daygrid-day.fc-day-today { background: var(--orange-dim) !important; }
        .fc-daygrid-day-number {
            color: var(--muted) !important; text-decoration: none !important;
            font-size: 12px !important; padding: 6px 8px !important;
            font-weight: 500;
        }
        .fc-day-today .fc-daygrid-day-number { color: var(--orange) !important; font-weight: 700; }
        .fc-toolbar-title {
            font-family: 'Barlow Condensed', sans-serif !important;
            font-size: 22px !important; font-weight: 600 !important;
            color: var(--text) !important; letter-spacing: .02em;
        }
        .fc-button {
            background: var(--surface2) !important; border: 1px solid var(--border) !important;
            color: var(--muted) !important; border-radius: 7px !important;
            font-family: 'Inter', sans-serif !important; font-size: 12px !important;
            padding: 5px 12px !important; transition: all .15s !important;
            box-shadow: none !important; text-transform: none !important;
        }
        .fc-button:hover { border-color: var(--orange) !important; color: var(--orange) !important; }
        .fc-button-active, .fc-button-primary:not(:disabled).fc-button-active {
            background: var(--orange-dim) !important;
            border-color: var(--orange) !important; color: var(--orange) !important;
        }
        .fc-button-group { gap: 4px; display: flex !important; }

        /* Events */
        .fc-event {
            border-radius: 5px !important; border: none !important;
            padding: 2px 6px !important; font-size: 11px !important;
            font-family: 'Inter', sans-serif !important; font-weight: 500 !important;
            cursor: pointer !important; margin-bottom: 1px !important;
        }
        .fc-event-activity  { background: var(--mint-dim) !important;   color: var(--mint) !important; }
        .fc-event-session   { background: var(--orange-dim) !important; color: var(--orange) !important; }
        .fc-event-comp-A    { background: #FF456022 !important; color: var(--red) !important; }
        .fc-event-comp-B    { background: #FFB02022 !important; color: var(--amber) !important; }
        .fc-event-comp-C    { background: #6366f122 !important; color: #818CF8 !important; }
        .fc-daygrid-more-link { color: var(--muted) !important; font-size: 10px !important; }

        /* TSS bar — signature élément */
        .tss-bar {
            position: absolute; bottom: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, var(--mint), var(--orange));
            border-radius: 0 2px 0 0; pointer-events: none;
            opacity: .6;
        }
        .fc-daygrid-day-frame { position: relative !important; }

        /* ── ÉCRAN DE LOGIN ──────────────────────────────────── */
        #login-screen {
            position: fixed; inset: 0; z-index: 200;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px;
        }
        #login-screen .logo-big {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 48px; font-weight: 700;
            color: var(--orange); letter-spacing: .01em;
        }
        #login-screen .logo-big span { color: var(--text); font-weight: 300; }
        #login-screen p { color: var(--muted); font-size: 14px; }
        #login-screen .btn-primary { padding: 12px 32px; font-size: 15px; border-radius: 12px; }

        /* ── PANNEAU LATÉRAL ─────────────────────────────────── */
        #panel-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,.5); backdrop-filter: blur(2px);
            display: none; opacity: 0; transition: opacity .25s;
        }
        #panel-overlay.show { display: block; opacity: 1; }

        #panel {
            position: fixed; top: 0; right: 0; z-index: 301;
            width: var(--panel-w); height: 100%;
            background: var(--surface);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform .3s cubic-bezier(.4,0,.2,1);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        #panel.open { transform: translateX(0); }

        /* Header panneau */
        #panel-header {
            flex-shrink: 0;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
        }
        #panel-header-info { flex: 1; min-width: 0; }
        #panel-eyebrow {
            font-size: 10px; font-weight: 600; letter-spacing: .1em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
        }
        #panel-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 24px; font-weight: 700; color: var(--text);
            line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #panel-date { font-size: 12px; color: var(--muted); margin-top: 3px; }
        #panel-close {
            background: none; border: none; color: var(--muted); cursor: pointer;
            font-size: 22px; line-height: 1; padding: 4px; flex-shrink: 0;
            transition: color .15s;
        }
        #panel-close:hover { color: var(--text); }

        /* Corps panneau scrollable */
        #panel-body {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Métriques grille */
        .metrics-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .metric-card {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 10px; text-align: center;
        }
        .metric-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 26px; font-weight: 700; color: var(--mint); line-height: 1;
        }
        .metric-label {
            font-size: 10px; font-weight: 600; letter-spacing: .07em;
            text-transform: uppercase; color: var(--muted); margin-top: 3px;
        }

        /* Badge validation */
        .validation-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .badge-ok   { background: #00C48C18; color: var(--green); border: 1px solid #00C48C30; }
        .badge-fail { background: #FF456018; color: var(--red);   border: 1px solid #FF456030; }
        .badge-wait { background: #FFB02018; color: var(--amber); border: 1px solid #FFB02030; }

        /* Section titre */
        .panel-section-title {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: .1em; color: var(--muted);
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        /* Description séance */
        .session-desc {
            background: var(--surface2); border: 1px solid var(--border);
            border-left: 3px solid var(--orange);
            border-radius: 8px; padding: 12px; font-size: 13px;
            line-height: 1.6; color: var(--text);
        }

        /* Compétition info */
        .comp-level {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: .05em;
        }
        .comp-A { background: #FF456022; color: var(--red);   border: 1px solid #FF456040; }
        .comp-B { background: #FFB02022; color: var(--amber); border: 1px solid #FFB02040; }
        .comp-C { background: #6366f122; color: #818CF8;      border: 1px solid #6366f140; }

        /* Commentaires */
        .comment-item {
            display: flex; gap: 10px; align-items: flex-start;
        }
        .comment-avatar {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
        }
        .avatar-coach   { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange); }
        .avatar-athlete { background: var(--mint-dim);   color: var(--mint);   border: 1px solid var(--mint); }
        .comment-bubble {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 12px; font-size: 13px; flex: 1;
        }
        .comment-meta { font-size: 10px; color: var(--muted); margin-bottom: 3px; }

        /* Zone saisie commentaire */
        .comment-input-wrap {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }
        .comment-input-wrap textarea {
            width: 100%; background: none; border: none; outline: none;
            color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
            padding: 10px 12px; resize: none; min-height: 72px;
        }
        .comment-input-wrap textarea::placeholder { color: var(--muted); }
        .comment-input-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; border-top: 1px solid var(--border);
        }
        .role-select {
            background: none; border: none; outline: none;
            color: var(--muted); font-family: 'Inter', sans-serif; font-size: 12px;
            cursor: pointer;
        }
        .role-select option { background: var(--surface2); }
        .btn-send {
            background: var(--orange); color: white; border: none;
            border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: opacity .15s;
        }
        .btn-send:hover { opacity: .85; }

        /* Formulaire nouvelle séance */
        .form-row { display: flex; flex-direction: column; gap: 4px; }
        .form-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: .07em; color: var(--muted);
        }
        .form-input {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; padding: 9px 12px;
            color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
            outline: none; width: 100%; transition: border-color .15s;
        }
        .form-input:focus { border-color: var(--orange); }
        .form-input::placeholder { color: var(--muted); }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-actions { display: flex; gap: 8px; }
        .form-actions .btn-primary { flex: 1; }

        /* Bouton graphique */
        .btn-chart {
            background: var(--mint-dim); color: var(--mint);
            border: 1px solid var(--mint); border-radius: 8px;
            padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all .15s; display: flex; align-items: center; gap: 6px;
            width: 100%; justify-content: center;
        }
        .btn-chart:hover { background: #00D4AA30; }

        /* LLM placeholder */
        .llm-card {
            background: var(--surface2); border: 1px solid var(--border);
            border-left: 3px solid var(--mint);
            border-radius: 8px; padding: 14px; font-size: 13px;
            color: var(--muted); line-height: 1.6;
        }
        .llm-card .llm-header {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: .1em; color: var(--mint); margin-bottom: 8px;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); border-radius: 10px;
            padding: 10px 20px; font-size: 13px;
            z-index: 500; opacity: 0; pointer-events: none;
            transition: opacity .3s; white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        /* Spinner */
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid var(--border); border-top-color: var(--orange);
            border-radius: 50%; animation: spin .7s linear infinite; margin: auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL GRAPHIQUE ─────────────────────────────────── */
        #chart-modal {
            position: fixed; z-index: 400;
            inset: 0; display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        #chart-modal.open { display: flex; }
        #chart-backdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
        }
        #chart-box {
            position: relative; z-index: 1;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
            width: 100%; max-width: 560px;
        }
        #chart-box-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        #chart-box-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px; font-weight: 700; color: var(--text);
        }
        #chart-close {
            background: none; border: none; color: var(--muted);
            font-size: 22px; cursor: pointer; transition: color .15s;
        }
        #chart-close:hover { color: var(--text); }
        #chart-canvas { width: 100% !important; }

        /* ── RESPONSIVE ──────────────────────────────────────── */
        @media (max-width: 640px) {
            :root { --panel-w: 100%; }
            #panel { border-left: none; border-top: 1px solid var(--border); }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            #chart-modal { padding: 0; }
            #chart-box { border-radius: 0; }
        }

        /* ── ÉTAT VIDE CALENDRIER ────────────────────────────── */
        .empty-day {
            font-size: 11px; color: var(--border); text-align: center;
            padding: 4px 0;
        }
    </style>
</head>
<body>

<!-- ── ÉCRAN LOGIN ──────────────────────────────────────────── -->
<div id="login-screen">
    <div class="logo-big">COACH <span>STRAVA</span></div>
    <p>Dashboard cyclisme de Nicolas Scapino</p>
    <button class="btn-primary" onclick="login()">Se connecter</button>
</div>

<!-- ── HEADER ───────────────────────────────────────────────── -->
<div id="header">
    <div id="header-left">
        <div id="logo">COACH <span>STRAVA</span></div>
        <div id="athlete-badge" style="display:none">
            <div class="avatar" id="athlete-initials">NS</div>
            <span id="athlete-name-text">Nicolas Scapino</span>
        </div>
    </div>
    <div id="header-right">
        <button class="btn-icon" onclick="refreshActivities()" title="Synchroniser Strava">↻ Sync</button>
        <button class="btn-secondary" onclick="logout()">Déconnexion</button>
    </div>
</div>

<!-- ── APP ──────────────────────────────────────────────────── -->
<div id="app">
    <div id="calendar-wrap">
        <div id="calendar"></div>
    </div>
</div>

<!-- ── OVERLAY + PANNEAU ────────────────────────────────────── -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
    <div id="panel-header">
        <div id="panel-header-info">
            <div id="panel-eyebrow">Activité</div>
            <div id="panel-title">—</div>
            <div id="panel-date">—</div>
        </div>
        <button id="panel-close" onclick="closePanel()">×</button>
    </div>
    <div id="panel-body"></div>
</div>

<!-- ── MODAL GRAPHIQUE ──────────────────────────────────────── -->
<div id="chart-modal">
    <div id="chart-backdrop" onclick="closeChart()"></div>
    <div id="chart-box">
        <div id="chart-box-header">
            <div id="chart-box-title">Puissance & FC</div>
            <button id="chart-close" onclick="closeChart()">×</button>
        </div>
        <canvas id="chart-canvas" height="220"></canvas>
    </div>
</div>

<!-- ── TOAST ────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── SCRIPT ───────────────────────────────────────────────── -->
<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════ */
const API = '/api';
let calendar, chartInst, currentEventData;

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function getToken() { return localStorage.getItem('token'); }

async function apiFetch(url, opts = {}) {
    const token = getToken();
    if (!token) throw new Error('Non connecté');
    const res = await fetch(url, {
        ...opts,
        headers: { ...opts.headers, 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
}

function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function fmtDuration(min) {
    if (!min) return '—';
    const h = Math.floor(min / 60), m = Math.round(min % 60);
    return h ? `${h}h${m.toString().padStart(2,'0')}` : `${m} min`;
}

/* ═══════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════ */
async function login() {
    try {
        const resp = await fetch(API + '/auth/magic-link?token=super-secret-token-123');
        const data = await resp.json();
        localStorage.setItem('token', data.access_token);
        initApp();
    } catch(e) { showToast('Erreur de connexion'); }
}

function logout() {
    localStorage.removeItem('token');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('athlete-badge').style.display = 'none';
}

async function loadAthleteInfo() {
    try {
        const data = await apiFetch(API + '/athlete');
        const fn = data.firstname || '', ln = data.lastname || '';
        document.getElementById('athlete-name-text').textContent = `${fn} ${ln}`;
        document.getElementById('athlete-initials').textContent =
            (fn[0] || '') + (ln[0] || '');
        document.getElementById('athlete-badge').style.display = 'flex';
    } catch(e) {}
}

async function refreshActivities() {
    try {
        showToast('↻ Synchronisation…');
        await apiFetch(API + '/activities/refresh', { method: 'POST' });
        calendar.refetchEvents();
        showToast('✓ Activités synchronisées');
    } catch(e) { showToast('Erreur synchronisation'); }
}

/* ═══════════════════════════════════════════════════════════
   INIT APP
═══════════════════════════════════════════════════════════ */
function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAthleteInfo();
    initCalendar();
}

/* ═══════════════════════════════════════════════════════════
   CALENDRIER
═══════════════════════════════════════════════════════════ */
function eventClass(ev) {
    if (ev.competition_id) {
        const lvl = ev.objective_level || 'C';
        return `fc-event-comp-${lvl}`;
    }
    if (ev.session_id)   return 'fc-event-session';
    return 'fc-event-activity';
}

function eventTitle(ev) {
    const badge = ev.badge || '';
    if (ev.competition_id) return `🏆 ${ev.competition_name || 'Compétition'}`;
    if (ev.session_id)     return `${badge} ${ev.session_title || 'Séance'}`;
    if (ev.activity_id)    return `${badge} ${ev.activity_name || 'Sortie'}`;
    return badge;
}

function initCalendar() {
    const calEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth',
        locale: 'fr',
        firstDay: 1,
        headerToolbar: {
            left:   'prev,next today',
            center: 'title',
            right:  'dayGridMonth,timeGridWeek'
        },
        dayMaxEvents: 3,
        eventClassNames: info => [eventClass(info.event.extendedProps)],
        events: async (info, ok, fail) => {
            try {
                const start = info.startStr.split('T')[0];
                const data  = await apiFetch(`${API}/calendar/week?start_date=${start}`);
                const evs   = data.map(ev => ({
                    id:    ev.activity_id || ev.session_id || ev.competition_id,
                    title: eventTitle(ev),
                    start: ev.calendar_date,
                    allDay: true,
                    extendedProps: ev
                }));
                // Ajouter les TSS bars en post-render
                _pendingTss = aggregateTss(data);
                ok(evs);
            } catch(e) { fail(e); }
        },
        eventClick: info => {
            currentEventData = info.event.extendedProps;
            openPanel(currentEventData);
        },
        dateClick: info => {
            openPanelCreate(info.dateStr);
        },
        // Barre TSS après rendu
        datesSet: () => {
            setTimeout(renderTssBars, 120);
        }
    });
    calendar.render();
}

/* TSS bars — signature visuelle */
let _pendingTss = {};
function aggregateTss(data) {
    const map = {};
    data.forEach(ev => {
        if (ev.tss && ev.calendar_date) {
            map[ev.calendar_date] = (map[ev.calendar_date] || 0) + parseFloat(ev.tss);
        }
    });
    return map;
}

function renderTssBars() {
    const maxTss = 150;
    document.querySelectorAll('.fc-daygrid-day[data-date]').forEach(cell => {
        const date = cell.getAttribute('data-date');
        const tss  = _pendingTss[date] || 0;
        // Nettoyer ancienne barre
        cell.querySelector('.tss-bar')?.remove();
        if (tss > 0) {
            const pct = Math.min(tss / maxTss * 100, 100);
            const bar = document.createElement('div');
            bar.className = 'tss-bar';
            bar.style.width = pct + '%';
            bar.title = `TSS : ${Math.round(tss)}`;
            const frame = cell.querySelector('.fc-daygrid-day-frame');
            if (frame) frame.appendChild(bar);
        }
    });
}

/* ═══════════════════════════════════════════════════════════
   PANNEAU LATÉRAL
═══════════════════════════════════════════════════════════ */
function openPanel(ev) {
    // Header
    let eyebrow, title;
    if (ev.competition_id) { eyebrow = 'Compétition'; title = ev.competition_name || 'Course'; }
    else if (ev.session_id && ev.activity_id) { eyebrow = 'Séance + Activité'; title = ev.session_title || 'Séance'; }
    else if (ev.session_id)  { eyebrow = 'Séance planifiée'; title = ev.session_title || 'Séance'; }
    else                      { eyebrow = 'Activité Strava'; title = ev.activity_name || 'Sortie'; }

    document.getElementById('panel-eyebrow').textContent = eyebrow;
    document.getElementById('panel-title').textContent   = title;
    document.getElementById('panel-date').textContent    = fmtDate(ev.calendar_date);

    // Body
    const body = document.getElementById('panel-body');
    body.innerHTML = buildPanelBody(ev);
    body.scrollTop = 0;

    // Charger commentaires
    if (ev.activity_id || ev.session_id) loadComments(ev);

    // Ouvrir
    document.getElementById('panel').classList.add('open');
    document.getElementById('panel-overlay').classList.add('show');
}

function buildPanelBody(ev) {
    let html = '';

    /* ── Badge validation ── */
    if (ev.session_id) {
        const status = ev.session_status || 'planned';
        if (status === 'validated')
            html += `<div><span class="validation-badge badge-ok">✓ Séance validée</span></div>`;
        else if (status === 'missed')
            html += `<div><span class="validation-badge badge-fail">✗ Séance non effectuée</span></div>`;
        else
            html += `<div><span class="validation-badge badge-wait">⏳ En attente</span></div>`;
    }

    /* ── Métriques activité ── */
    if (ev.activity_id) {
        html += `
        <div>
            <div class="panel-section-title">Métriques</div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value">${ev.tss ? Math.round(ev.tss) : '—'}</div>
                    <div class="metric-label">TSS</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${ev.intensity_factor ? parseFloat(ev.intensity_factor).toFixed(2) : '—'}</div>
                    <div class="metric-label">IF</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${ev.moving_time_min ? fmtDuration(ev.moving_time_min) : '—'}</div>
                    <div class="metric-label">Durée</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${ev.distance_km ? Math.round(ev.distance_km) : '—'}</div>
                    <div class="metric-label">km</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${ev.avg_heartrate ? Math.round(ev.avg_heartrate) : '—'}</div>
                    <div class="metric-label">FC moy</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${ev.avg_speed_kmh ? parseFloat(ev.avg_speed_kmh).toFixed(1) : '—'}</div>
                    <div class="metric-label">km/h</div>
                </div>
            </div>
        </div>
        <button class="btn-chart" onclick="viewChart(${ev.activity_id})">
            📈 Graphique puissance / FC
        </button>`;
    }

    /* ── Description séance ── */
    if (ev.session_id && ev.session_description) {
        html += `
        <div>
            <div class="panel-section-title">Séance prescrite</div>
            <div class="session-desc">${ev.session_description}</div>
        </div>`;
    }

    /* ── Compétition ── */
    if (ev.competition_id) {
        const lvl = ev.objective_level || 'C';
        html += `
        <div>
            <div class="panel-section-title">Informations</div>
            <div style="display:flex;flex-direction:column;gap:10px">
                <div><span class="comp-level comp-${lvl}">Objectif ${lvl}</span></div>
                ${ev.result_rank ? `<p style="font-size:13px">🥇 Classement : <b>${ev.result_rank}</b></p>` : ''}
                ${ev.result_time ? `<p style="font-size:13px">⏱ Temps : <b>${ev.result_time}</b></p>` : ''}
                ${ev.result_feeling ? `<p style="font-size:13px">💬 Ressenti : <b>${ev.result_feeling}/5</b></p>` : ''}
            </div>
        </div>`;
    }

    /* ── Analyse LLM (placeholder) ── */
    if (ev.activity_id || ev.competition_id) {
        html += `
        <div>
            <div class="panel-section-title">Analyse IA</div>
            <div class="llm-card">
                <div class="llm-header">● OpenRouter</div>
                <span id="llm-text">Cliquez pour générer une analyse…</span>
                <br><br>
                <button class="btn-secondary" style="font-size:12px;padding:6px 12px" onclick="requestLLM(${ev.activity_id || 'null'})">Générer l'analyse</button>
            </div>
        </div>`;
    }

    /* ── Commentaires ── */
    const entityId = ev.activity_id || ev.session_id;
    const entityType = ev.activity_id ? 'activity' : ev.session_id ? 'session' : null;

    html += `
    <div>
        <div class="panel-section-title">Commentaires</div>
        <div id="comments-list" style="display:flex;flex-direction:column;gap:8px">
            <div class="spinner"></div>
        </div>
    </div>`;

    if (entityId && entityType) {
        html += `
        <div>
            <div class="comment-input-wrap">
                <textarea id="new-comment" placeholder="Ajouter un commentaire…"></textarea>
                <div class="comment-input-footer">
                    <select class="role-select" id="comment-role">
                        <option value="coach">Coach</option>
                        <option value="athlete">Athlète</option>
                    </select>
                    <button class="btn-send" onclick="addComment(${entityId}, '${entityType}')">Envoyer</button>
                </div>
            </div>
        </div>`;
    }

    return html;
}

function openPanelCreate(dateStr) {
    document.getElementById('panel-eyebrow').textContent = 'Nouveau';
    document.getElementById('panel-title').textContent   = 'Ajouter une séance';
    document.getElementById('panel-date').textContent    = fmtDate(dateStr);

    document.getElementById('panel-body').innerHTML = buildCreateForm(dateStr);
    document.getElementById('panel').classList.add('open');
    document.getElementById('panel-overlay').classList.add('show');
}

function buildCreateForm(dateStr) {
    return `
    <div>
        <div class="panel-section-title">Séance planifiée</div>
        <div style="display:flex;flex-direction:column;gap:12px">
            <div class="form-row">
                <div class="form-label">Date</div>
                <input class="form-input" type="date" id="sess-date" value="${dateStr}">
            </div>
            <div class="form-row">
                <div class="form-label">Titre</div>
                <input class="form-input" type="text" id="sess-title" placeholder="ex : Tempo 2×20 min">
            </div>
            <div class="form-row">
                <div class="form-label">Description</div>
                <textarea class="form-input" id="sess-desc" rows="4"
                    placeholder="Décrire les objectifs, intervalles, zones de puissance…"
                    style="resize:vertical"></textarea>
            </div>
            <div class="form-row-2">
                <div class="form-row">
                    <div class="form-label">Durée (min)</div>
                    <input class="form-input" type="number" id="sess-duration" placeholder="90">
                </div>
                <div class="form-row">
                    <div class="form-label">Intensité</div>
                    <select class="form-input" id="sess-intensity">
                        <option value="easy">Facile</option>
                        <option value="moderate">Modéré</option>
                        <option value="hard" selected>Difficile</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-label">Type de sport</div>
                <select class="form-input" id="sess-type">
                    <option value="Ride">Vélo</option>
                    <option value="VirtualRide">Home-trainer</option>
                    <option value="Run">Course à pied</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn-primary" onclick="createSession()">Créer la séance</button>
                <button class="btn-secondary" onclick="closePanel()">Annuler</button>
            </div>
        </div>
    </div>`;
}

function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panel-overlay').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════════
   SÉANCES
═══════════════════════════════════════════════════════════ */
async function createSession() {
    const date      = document.getElementById('sess-date')?.value;
    const title     = document.getElementById('sess-title')?.value?.trim();
    const desc      = document.getElementById('sess-desc')?.value;
    const duration  = document.getElementById('sess-duration')?.value;
    const type      = document.getElementById('sess-type')?.value;
    const intensity = document.getElementById('sess-intensity')?.value;

    if (!title) { showToast('⚠ Titre requis'); return; }

    try {
        await apiFetch(API + '/sessions/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_date: date,
                title, description: desc,
                planned_duration: parseInt(duration) || null,
                sport_type: type,
                planned_intensity: intensity
            })
        });
        closePanel();
        calendar.refetchEvents();
        showToast('✓ Séance créée');
    } catch(e) { showToast('Erreur création séance'); }
}

/* ═══════════════════════════════════════════════════════════
   COMMENTAIRES
═══════════════════════════════════════════════════════════ */
async function loadComments(ev) {
    const listEl = document.getElementById('comments-list');
    if (!listEl) return;
    let url = `${API}/comments/?`;
    if (ev.activity_id) url += `activity_id=${ev.activity_id}`;
    else if (ev.session_id) url += `session_id=${ev.session_id}`;
    else { listEl.innerHTML = '<p style="color:var(--muted);font-size:12px">Aucun commentaire.</p>'; return; }
    try {
        const comments = await apiFetch(url);
        if (!comments.length) {
            listEl.innerHTML = '<p style="color:var(--muted);font-size:12px">Aucun commentaire.</p>';
            return;
        }
        listEl.innerHTML = comments.map(c => {
            const isCoach = c.author_role === 'coach';
            return `<div class="comment-item">
                <div class="comment-avatar ${isCoach ? 'avatar-coach' : 'avatar-athlete'}">${isCoach ? 'C' : 'N'}</div>
                <div class="comment-bubble">
                    <div class="comment-meta">${isCoach ? 'Coach' : 'Nicolas'} · ${c.created_at ? new Date(c.created_at).toLocaleDateString('fr-FR') : ''}</div>
                    ${c.comment}
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        listEl.innerHTML = '<p style="color:var(--muted);font-size:12px">Erreur chargement.</p>';
    }
}

async function addComment(entityId, entityType) {
    const text = document.getElementById('new-comment')?.value?.trim();
    const role = document.getElementById('comment-role')?.value || 'coach';
    if (!text) return;
    try {
        await apiFetch(API + '/comments/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                activity_id: entityType === 'activity' ? entityId : null,
                session_id:  entityType === 'session'  ? entityId : null,
                comment: text,
                author_role: role
            })
        });
        document.getElementById('new-comment').value = '';
        loadComments(currentEventData);
        showToast('✓ Commentaire envoyé');
    } catch(e) { showToast('Erreur envoi commentaire'); }
}

/* ═══════════════════════════════════════════════════════════
   GRAPHIQUE
═══════════════════════════════════════════════════════════ */
function viewChart(activityId) {
    document.getElementById('chart-modal').classList.add('open');
    const ctx = document.getElementById('chart-canvas').getContext('2d');
    if (chartInst) chartInst.destroy();

    // TODO : récupérer streams via GET /api/activities/{id}/streams
    // Données fictives en attendant
    const labels = Array.from({ length: 20 }, (_, i) => `${i * 5} min`);
    const watts  = labels.map(() => 180 + Math.round((Math.random() - .5) * 80));
    const hr     = labels.map(() => 148 + Math.round((Math.random() - .5) * 20));

    chartInst = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Puissance (W)',
                    data: watts,
                    borderColor: '#FF6B35',
                    backgroundColor: '#FF6B3518',
                    fill: true,
                    tension: .4,
                    pointRadius: 0,
                    borderWidth: 2,
                    yAxisID: 'yW'
                },
                {
                    label: 'FC (bpm)',
                    data: hr,
                    borderColor: '#00D4AA',
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: .4,
                    pointRadius: 0,
                    borderWidth: 2,
                    yAxisID: 'yHR'
                }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: '#7A8099', font: { family: 'Inter', size: 11 } } }
            },
            scales: {
                x:   { ticks: { color: '#7A8099', font: { size: 10 } }, grid: { color: '#2A3045' } },
                yW:  { position: 'left',  ticks: { color: '#FF6B35', font: { size: 10 } }, grid: { color: '#2A304555' } },
                yHR: { position: 'right', ticks: { color: '#00D4AA', font: { size: 10 } }, grid: { display: false } }
            }
        }
    });
}

function closeChart() {
    document.getElementById('chart-modal').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════
   LLM (placeholder)
═══════════════════════════════════════════════════════════ */
async function requestLLM(activityId) {
    const el = document.getElementById('llm-text');
    if (!el) return;
    el.innerHTML = '<span class="spinner"></span>';
    try {
        const data = await apiFetch(API + '/llm/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ activity_id: activityId })
        });
        el.textContent = data.analysis || 'Analyse générée.';
    } catch(e) {
        el.textContent = 'Analyse non disponible (endpoint LLM à brancher).';
    }
}

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
if (getToken()) {
    document.getElementById('login-screen').style.display = 'none';
    initApp();
} else {
    document.getElementById('app').style.display = 'none';
}
</script>
